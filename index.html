<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Core & Discovery -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#121212" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Native App-Like Capability -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TagTales" />

    <!-- iOS App Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/pwa-192x192.png" />

    <!-- iOS Splash Screen/Launch Screen Standard Fallback -->
    <link rel="apple-touch-startup-image" href="/apple-touch-startup-image.png" />

    <!-- iOS Dynamic Splash Screens (Responsive Media Queries for common Apple devices) -->
    <!-- iPhone 15 Pro Max, 14 Pro Max (1290x2796) -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1290-2796.png" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 15 Pro, 15, 14 Pro (1179x2556) -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1179-2556.png" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 14 Plus, 13 Pro Max, 12 Pro Max (1284x2778) -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1284-2778.png" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 13 Pro, 13, 12 Pro, 12 (1170x2532) -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1170-2532.png" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 11 Pro Max, XS Max (1242x2688) -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1242-2688.png" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 11, XR (828x1792) -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-828-1792.png" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad Pro 12.9" (2048x2732) -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-2048-2732.png" media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad Pro 11" (1668x2388) -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1668-2388.png" media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

    <!--META_TITLE-->
    <!--META_DESCRIPTION-->
    <!--META_KEYWORDS-->
    <!--META_OG_IMAGE-->
    <!-- Google Tag Consent Mode Default Setup -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Default to denied for GDPR/ePrivacy compliance
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'personalization_storage': 'denied',
        'security_storage': 'granted'
      });
    </script>
    <!-- Stubs for tracking tools to avoid runtime errors before they load -->
    <script>
      window.fbq = window.fbq || function() {
        (window.fbq.q = window.fbq.q || []).push(arguments);
      };
      window._fbq = window._fbq || window.fbq;
      window.fbq.push = window.fbq;
      window.fbq.loaded = true;
      window.fbq.version = '2.0';
      window.fbq.queue = [];
      window.fbq('consent', 'revoke');
      window.fbq('track', 'PageView');
    </script>
    
    <link rel="preload" href="/fonts/shamgod-bold-webfont.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Non-blocking asynchronous Google Fonts loading -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>

    <!-- Delayed Third Party Loaders to Optimize PageSpeed Metrics -->
    <script>
      (function() {
        let initialized = false;
        function initThirdParty() {
          if (initialized) return;
          initialized = true;

          // Remove interaction listening
          window.removeEventListener('scroll', initThirdParty);
          window.removeEventListener('mousemove', initThirdParty);
          window.removeEventListener('touchstart', initThirdParty);

          // 1. Google Analytics
          const gtagScript = document.createElement('script');
          gtagScript.async = true;
          gtagScript.src = "https://www.googletagmanager.com/gtag/js?id=G-WZ8M5CQVY1";
          document.head.appendChild(gtagScript);

          gtag('js', new Date());
          gtag('config', 'G-WZ8M5CQVY1');

          // 2. Facebook Pixel
          const fbScript = document.createElement('script');
          fbScript.async = true;
          fbScript.src = "https://connect.facebook.net/en_US/fbevents.js";
          document.head.appendChild(fbScript);

          // 3. SendFox
          const sendFoxScript = document.createElement('script');
          sendFoxScript.async = true;
          sendFoxScript.src = "https://cdn.sendfox.com/js/form.js";
          sendFoxScript.charset = "utf-8";
          document.body.appendChild(sendFoxScript);
        }

        // Trigger on interaction or fallback to 9.5s delay
        window.addEventListener('scroll', initThirdParty, { passive: true });
        window.addEventListener('mousemove', initThirdParty, { passive: true });
        window.addEventListener('touchstart', initThirdParty, { passive: true });
        
        // Safety timeout trigger (not executed if interaction occurs earlier)
        setTimeout(initThirdParty, 9500);
      })();
    </script>
  </head>
  <body>
    <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1331292394239342&ev=PageView&noscript=1"/>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
